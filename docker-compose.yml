services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: contact_manager_development
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: bash -c "bundle exec rails db:prepare && bundle exec rails s -b 0.0.0.0"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: password
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: pnpm dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  bundle_cache:
  node_modules:
