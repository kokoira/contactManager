name: "バグ報告"
description: "バグや不具合の報告"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告の Issue を作成します。
        作業開始前にこの Issue を作成し、ブランチ名は `fix/#{issue番号}-{説明}` の形式で作成してください。

  - type: textarea
    id: description
    attributes:
      label: "バグの概要"
      description: "発生している問題を簡潔に説明してください"
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "再現手順"
      description: "バグを再現するための手順"
      placeholder: |
        1. 〇〇画面を開く
        2. 〇〇ボタンをクリックする
        3. エラーが発生する
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "期待される動作"
      description: "本来どのように動作すべきか"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "実際の動作"
      description: "実際に何が起きているか"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "環境情報"
      description: "OS、ブラウザ、Docker 状況など"
      placeholder: |
        - OS: macOS 14.x
        - ブラウザ: Chrome 125
        - Docker: 起動中 / 停止中
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "エラーログ・スクリーンショット"
      description: "関連するログやスクリーンショットがあれば添付してください"
    validations:
      required: false
